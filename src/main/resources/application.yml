server:
  port: 8080
  servlet:
    context-path: /api
    # ssl:
    # key-store: classpath:keystore.jks
    # key-store-password: 123456
    # keyStoreType: JKS
    # keyAlias: tomcat

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/demo_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    # HikariCP 连接池配置（Spring Boot 4.0 默认连接池）
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: SpringBootHikariCP

  # Thymeleaf 配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false  # 开发环境设置为false，生产环境设置为true
    check-template: true
    check-template-location: true
    servlet:
      content-type: text/html
  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0   #禁用资源的缓存，使得每次请求都会从磁盘重新加载资源，因为上传的文件会提交到静态目录

  aop:
    debug:
      controller: true   # 控制Controller切面是否开启
      service: false     # 控制Service切面是否开启
      log-record: true   # 控制LogRecord注解切面是否开启

# MyBatis Plus配置
mybatis-plus:
  # 配置 Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 配置实体类包路径
  type-aliases-package: com.xiaowei.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 解决缓存问题
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 项目配置
demo:
  # JWT配置
  jwt:
    secret: xiaowei-demo-secret-key-for-jwt-need-long-enough
    expire: 604800  # 7天
    header: Authorization
    issuer: xiaowei-demo

# 文件上传配置
file:
  upload:
    max-size: 2097152  # 2MB
    allowed-types: jpg,jpeg,png,gif,webp
    dir: /static/upload

# 日志配置（Logback with SLF4J）
logging:
  # 控制台输出配置
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  # 文件输出配置
  file:
    name: logs/user-demo.log

  # 日志级别配置
  level:
    root: INFO
    com.xiaowei.demo: DEBUG
    com.baomidou.mybatisplus: WARN
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.security: INFO
    org.springframework.transaction: DEBUG
    org.mybatis: DEBUG
    java.sql: DEBUG
    java.sql.Connection: DEBUG
    java.sql.Statement: DEBUG
    java.sql.PreparedStatement: DEBUG

  # Logback 配置
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30